<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- Add to Home Screen → launches with no Safari chrome (true fullscreen on iPhone). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eggdle" />
    <meta name="theme-color" content="#0e1b2a" />
    <title>Eggdle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="btn-left" class="touchzone" aria-label="Move left"></div>
      <div id="btn-right" class="touchzone" aria-label="Move right"></div>
      <div id="overlay"></div>
    </div>
    <p class="hint">← → or A/D · hold the left/right side on touch · M to mute</p>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
